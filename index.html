<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speedrun POV S12 WR</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="app">
	<section class="panel">
		<div class="topbar">
			<div class="eyebrow">S12 PD2 WR Speedrun 1:35:54</div>

			<div class="headline-row">
				<h1>Speedrunners POV</h1>
			</div>
		</div>

		<div class="controls-wrap">
			<div class="controls" aria-label="Video controls">
				<button class="btn btn--primary" id="togglePlay" type="button" aria-label="Play both videos">
					<span class="material-symbols-rounded" id="togglePlayIcon">play_arrow</span>
				</button>

				<button class="btn" id="restartBoth" type="button" aria-label="Restart both videos">
					<span class="material-symbols-rounded">replay</span>
				</button>

				<button class="btn" id="rewindBoth" type="button" aria-label="Rewind both videos by 10 seconds">
					<span class="material-symbols-rounded">replay_10</span>
				</button>

				<button class="btn" id="forwardBoth" type="button" aria-label="Fast forward both videos by 10 seconds">
					<span class="material-symbols-rounded">forward_10</span>
				</button>

				<button class="btn" id="toggleMuteFirst" type="button" aria-label="Toggle first video audio">
					<span class="material-symbols-rounded" id="muteFirstIcon">volume_up</span>
				</button>
			</div>

			<div class="timeline-row">
				<div class="time" id="currentTime">0:00</div>
				<input class="timeline" id="timeline" type="range" min="0" max="100" value="0" step="0.05" aria-label="Shared video timeline" />
				<div class="time" id="duration">0:00</div>
			</div>
		</div>

		<div class="grid">
			<article class="video-card">
				<div class="video-title teams team-harvest">Tele Sorc - Pxned</div>
				<div class="video-shell">
					<div id="player1"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-progression">Assassin 1 - Kirine</div>
				<div class="video-shell">
					<div id="player2"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-trist-hole">Barb - Drili</div>
				<div class="video-shell">
					<div id="player3"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-pit">Necro 1 - Kevowns</div>
				<div class="video-shell">
					<div id="player4"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-tower">Assassin 2 - Kaz</div>
				<div class="video-shell">
					<div id="player5"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-progression">Necro 2 - Jymnasium</div>
				<div class="video-shell">
					<div id="player6"></div>
				</div>
			</article>

			<!-- 			<article class="video-card">
				<h3 class="video-title teams " style="top:-11px;">Twitch POV</h3>
				<div class="video-shell" data-platform="twitch" data-video-id="2609194736" data-start="0">
					<div id="player6"></div>
				</div>
			</article> -->

		</div>

		<div class="footer-note">
			<span>
				<span class="kbd">Space</span> play/pause,
				<span class="kbd">←</span> back,
				<span class="kbd">→</span> forward,
				<span class="kbd">R</span> restart,
				<span class="kbd">M</span> mute first
			</span>
			<span id="statusText">Ready</span>
		</div>
	</section>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
	(() => {
	const CONFIG = {
		players: [
			{ id: "player1", videoId: "9pvRbezK8Ko", start: 41, quality: "hd720" },
			{ id: "player2", videoId: "_IWYetw6X1Q", start: 11, quality: "hd1080" },
			{ id: "player3", videoId: "3H0DvdlLVEU", start: 129, quality: "hd1080" },
			{ id: "player4", videoId: "X0KH7VcogFE", start: 95, quality: "hd1080" },
			{ id: "player5", videoId: "aMVdJk2GGNw", start: 5, quality: "hd720" }
		],
		seekStep: 10,
		uiTickMs: 120
	};

	const state = {
		players: [],
		readyCount: 0,
		uiInterval: null,
		isScrubbing: false,
		firstMuted: false
	};

	let twitchPlayer = null;
	let twitchReady = false;
	const twitchStart = 4;

	const els = {
		togglePlay: document.getElementById("togglePlay"),
		togglePlayIcon: document.getElementById("togglePlayIcon"),
		restartBoth: document.getElementById("restartBoth"),
		rewindBoth: document.getElementById("rewindBoth"),
		forwardBoth: document.getElementById("forwardBoth"),
		toggleMuteFirst: document.getElementById("toggleMuteFirst"),
		muteFirstIcon: document.getElementById("muteFirstIcon"),
		timeline: document.getElementById("timeline"),
		currentTime: document.getElementById("currentTime"),
		duration: document.getElementById("duration"),
		statusText: document.getElementById("statusText")
	};

	function setStatus(text) {
		els.statusText.textContent = text;
	}

	function formatTime(seconds) {
		const total = Math.max(0, Math.floor(Number(seconds) || 0));
		const hours = Math.floor(total / 3600);
		const mins = Math.floor((total % 3600) / 60);
		const secs = total % 60;

		if (hours > 0) {
			return `${hours}:${String(mins).padStart(2, "0")}:${String(secs).padStart(
				2,
				"0"
			)}`;
		}

		return `${mins}:${String(secs).padStart(2, "0")}`;
	}

	function clamp(value, min, max) {
		return Math.min(Math.max(value, min), max);
	}

	function getMaster() {
		return state.players[0] || null;
	}

	function getFirstPlayer() {
		return state.players[0]?.instance || null;
	}

	function getPlayerState(player) {
		try {
			return player?.getPlayerState?.();
		} catch {
			return -1;
		}
	}

	function isAnyPlaying() {
		return state.players.some(
			(p) => getPlayerState(p.instance) === YT.PlayerState.PLAYING
		);
	}

	function playTwitch() {
		if (!twitchPlayer || !twitchReady) return;

		try {
			const current = twitchPlayer.getCurrentTime
				? twitchPlayer.getCurrentTime()
				: twitchStart;
			twitchPlayer.seek(current || twitchStart);
		} catch {}

		try {
			twitchPlayer.play();
		} catch {}
	}

	function pauseTwitch() {
		if (!twitchPlayer || !twitchReady) return;

		try {
			twitchPlayer.pause();
		} catch {}
	}

function stopTwitch() {
	if (!twitchPlayer || !twitchReady) return;

	try {
		twitchPlayer.pause();
		twitchPlayer.setVideo("v2609194736", 0);
	} catch {}
}

	function seekTwitchToAbsolute(time) {
		if (!twitchPlayer || !twitchReady) return;

		try {
			twitchPlayer.seek(Math.max(0, time));
		} catch {}
	}

	function updatePlayButton() {
		const playing = isAnyPlaying();
		els.togglePlayIcon.textContent = playing ? "pause" : "play_arrow";
		els.togglePlay.setAttribute(
			"aria-label",
			playing ? "Pause both videos" : "Play both videos"
		);
	}

	function updateMuteButton() {
		els.muteFirstIcon.textContent = state.firstMuted ? "volume_off" : "volume_up";
		els.toggleMuteFirst.classList.toggle("btn--active", !state.firstMuted);
		els.toggleMuteFirst.setAttribute(
			"aria-label",
			state.firstMuted ? "Unmute first video" : "Mute first video"
		);
	}

	function getRelativeCurrent(playerObj) {
		if (!playerObj?.instance?.getCurrentTime) return 0;
		return Math.max(0, playerObj.instance.getCurrentTime() - playerObj.start);
	}

	function getRelativeDuration(playerObj) {
		if (!playerObj?.instance?.getDuration) return 0;
		return Math.max(0, playerObj.instance.getDuration() - playerObj.start);
	}

	function syncTimelineVisual(value, max) {
		const safeMax = Math.max(0.0001, Number(max) || 100);
		const pct = `${(Number(value) / safeMax) * 100}%`;
		els.timeline.style.setProperty("--progress", pct);
	}

	function updateTimeline() {
		const master = getMaster();
		if (!master || !master.instance) return;

		const current = getRelativeCurrent(master);
		const duration = getRelativeDuration(master);

		if (!state.isScrubbing) {
			els.timeline.max = duration || 100;
			els.timeline.value = clamp(current, 0, duration || 100);
			syncTimelineVisual(els.timeline.value, els.timeline.max);
			els.currentTime.textContent = formatTime(current);
		}

		els.duration.textContent = formatTime(duration);
		updatePlayButton();
	}

	function runBoth(callback) {
		state.players.forEach((playerObj) => {
			if (playerObj.instance) callback(playerObj);
		});
	}

	function playBoth() {
		runBoth(({ instance }) => instance.playVideo());

		if (twitchReady) {
			setTimeout(() => {
				playTwitch();
			}, 150);
		}

		setStatus("Playing both");
		updatePlayButton();
	}

	function pauseBoth() {
		runBoth(({ instance }) => instance.pauseVideo());
		pauseTwitch();

		setStatus("Paused");
		updatePlayButton();
	}

function restartBoth() {
	runBoth(({ instance, start }) => {
		instance.seekTo(start, true);
		instance.playVideo();
	});

	if (twitchReady) {
		twitchPlayer.seek(twitchStart);

		setTimeout(() => {
			twitchPlayer.play();
		}, 150);
	}

	setStatus("Restarted");
	updatePlayButton();
}

	function offsetBoth(seconds) {
		runBoth(({ instance }) => {
			const current = instance.getCurrentTime();
			instance.seekTo(Math.max(0, current + seconds), true);
		});

		if (twitchReady) {
			try {
				const current = twitchPlayer.getCurrentTime
					? twitchPlayer.getCurrentTime()
					: 0;
				seekTwitchToAbsolute(current + seconds);
			} catch {}
		}

		setStatus(
			seconds > 0 ? `Forward ${seconds}s` : `Rewind ${Math.abs(seconds)}s`
		);
	}

	function seekRelativeTo(relativeTime, shouldPlayAfter = false) {
		runBoth(({ instance, start }) => {
			instance.seekTo(start + relativeTime, true);
			if (shouldPlayAfter) instance.playVideo();
		});

		if (twitchReady) {
			try {
				seekTwitchToAbsolute(twitchStart + relativeTime);

				if (shouldPlayAfter) {
					setTimeout(() => {
						playTwitch();
					}, 150);
				}
			} catch {}
		}

		els.currentTime.textContent = formatTime(relativeTime);
		syncTimelineVisual(relativeTime, els.timeline.max);
		setStatus(`Seek to ${formatTime(relativeTime)}`);
	}

	function toggleMuteFirst() {
		const first = getFirstPlayer();
		if (!first) return;

		if (state.firstMuted) {
			first.unMute();
			state.firstMuted = false;
			setStatus("First video unmuted");
		} else {
			first.mute();
			state.firstMuted = true;
			setStatus("First video muted");
		}

		updateMuteButton();
	}

	function onPlayerReady(event) {
		const playerObj = state.players.find((p) => p.instance === event.target);
		if (!playerObj) return;

		playerObj.ready = true;
		state.readyCount += 1;

		// Force a true "ready but not playing" state
		try {
			event.target.cueVideoById({
				videoId: playerObj.videoId,
				startSeconds: playerObj.start,
				suggestedQuality: playerObj.quality
			});
		} catch {
			try {
				event.target.pauseVideo();
				event.target.seekTo(playerObj.start, true);
			} catch {}
		}

		if (playerObj.id === "player1") {
			state.firstMuted = event.target.isMuted ? event.target.isMuted() : false;

			if (state.firstMuted) {
				try {
					event.target.unMute();
					state.firstMuted = false;
				} catch {}
			}
		} else {
			try {
				event.target.mute();
			} catch {}
		}

		updateMuteButton();
		updatePlayButton();

		if (state.readyCount === CONFIG.players.length) {
			updateTimeline();

			if (!state.uiInterval) {
				state.uiInterval = setInterval(updateTimeline, CONFIG.uiTickMs);
			}

			setStatus("Loaded");
		}
	}

	function onPlayerStateChange() {
		updatePlayButton();
	}

	function onPlayerError(event, label) {
		setStatus(`${label} error: ${event.data}`);
		console.error(`${label} error`, event.data);
	}

	function initTwitchPlayer() {
	twitchPlayer = new Twitch.Player("player6", {
		width: "100%",
		height: "100%",
		video: "v2609194736",
		parent: [window.location.hostname],
		autoplay: false,
		muted: true,
		time: `0h0m${twitchStart}s`
	});

	twitchPlayer.addEventListener(Twitch.Player.READY, () => {
		twitchReady = true;

		try {
			twitchPlayer.setQuality("chunked");
			twitchPlayer.setMuted(true);
			twitchPlayer.pause();
			twitchPlayer.seek(twitchStart);
		} catch {}
	});

		twitchPlayer.addEventListener(Twitch.Player.PLAYBACK_BLOCKED, () => {
			setStatus("Twitch playback blocked");
		});
	}

	window.onYouTubeIframeAPIReady = function () {
		const origin = window.location.origin;

		state.players = CONFIG.players.map((cfg, index) => {
			const instance = new YT.Player(cfg.id, {
				width: "100%",
				height: "100%",
				videoId: cfg.videoId,
				playerVars: {
					autoplay: 0,
					controls: 0,
					rel: 0,
					playsinline: 1,
					enablejsapi: 1,
					origin,
					start: cfg.start
				},
				events: {
					onReady: onPlayerReady,
					onStateChange: onPlayerStateChange,
					onError: (e) => onPlayerError(e, `Player ${index + 1}`)
				}
			});

			return {
				...cfg,
				instance,
				ready: false
			};
		});

		setStatus("Initializing players…");
		initTwitchPlayer();
	};

	els.togglePlay.addEventListener("click", () => {
		if (isAnyPlaying()) {
			pauseBoth();
		} else {
			playBoth();
		}
	});

	els.restartBoth.addEventListener("click", restartBoth);
	els.rewindBoth.addEventListener("click", () => offsetBoth(-CONFIG.seekStep));
	els.forwardBoth.addEventListener("click", () => offsetBoth(CONFIG.seekStep));
	els.toggleMuteFirst.addEventListener("click", toggleMuteFirst);

	els.timeline.addEventListener("input", () => {
		state.isScrubbing = true;
		syncTimelineVisual(els.timeline.value, els.timeline.max);
		els.currentTime.textContent = formatTime(els.timeline.value);
	});

	els.timeline.addEventListener("change", () => {
		const target = Number(els.timeline.value) || 0;
		const keepPlaying = isAnyPlaying();
		seekRelativeTo(target, keepPlaying);
		state.isScrubbing = false;
	});

	els.timeline.addEventListener("pointerdown", () => {
		state.isScrubbing = true;
	});

	els.timeline.addEventListener("pointerup", () => {
		state.isScrubbing = false;
	});

	document.addEventListener("keydown", (event) => {
		const tag = document.activeElement?.tagName;
		const typing =
			tag === "INPUT" ||
			tag === "TEXTAREA" ||
			document.activeElement?.isContentEditable;

		if (typing && document.activeElement !== els.timeline) return;

		switch (event.key) {
			case " ":
			case "k":
			case "K":
				event.preventDefault();
				els.togglePlay.click();
				break;
			case "ArrowLeft":
				event.preventDefault();
				offsetBoth(-CONFIG.seekStep);
				break;
			case "ArrowRight":
				event.preventDefault();
				offsetBoth(CONFIG.seekStep);
				break;
			case "r":
			case "R":
				event.preventDefault();
				restartBoth();
				break;
			case "m":
			case "M":
				event.preventDefault();
				toggleMuteFirst();
				break;
		}
	});

	window.addEventListener("beforeunload", () => {
		if (state.uiInterval) clearInterval(state.uiInterval);

		runBoth(({ instance, platform }) => {
			try {
				if (platform === "youtube" && instance.destroy) instance.destroy();
			} catch {}
		});

		try {
			if (twitchPlayer) twitchPlayer.pause();
		} catch {}
	});
})();

</script>
</body>
</html>
