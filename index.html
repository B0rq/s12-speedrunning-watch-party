<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual YouTube Showcase</title>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0"
  />

  <style>
    :root {
	--bg: #0b0d12;
	--border: rgba(255, 255, 255, 0.12);
	--text: #f5f7fb;
	--text-soft: rgba(245, 247, 251, 0.72);
	--accent: #7c9cff;
	--accent-2: #9f7cff;
	--danger: #ff6b6b;
	--shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
	--radius-xl: 28px;
	--radius-lg: 18px;
	--pad: clamp(16px, 2vw, 28px);
	--gap: clamp(14px, 1.5vw, 22px);
	--control-h: 54px;
	--player-min-h: 320px;
	--focus: 0 0 0 3px rgba(124, 156, 255, 0.35);
}

* {
	box-sizing: border-box;
}

html {
	color-scheme: dark;
}

html,
body {
	margin: 0;
	min-height: 100%;
	background: radial-gradient(
			circle at top left,
			rgba(124, 156, 255, 0.12),
			transparent 32%
		),
		radial-gradient(
			circle at top right,
			rgba(159, 124, 255, 0.1),
			transparent 28%
		),
		linear-gradient(180deg, #0b0d12 0%, #090b10 100%);
	color: var(--text);
	font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
		"Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
	min-height: 100vh;
	display: grid;
	place-items: center;
	padding: clamp(16px, 2.5vw, 32px);
}

.app {
	width: min(1600px, 100%);
	display: grid;
	gap: var(--gap);
}

.panel {
	background: linear-gradient(
		180deg,
		rgba(255, 255, 255, 0.07),
		rgba(255, 255, 255, 0.045)
	);
	border: 1px solid var(--border);
	border-radius: var(--radius-xl);
	box-shadow: var(--shadow);
	backdrop-filter: blur(12px);
	-webkit-backdrop-filter: blur(12px);
	overflow: clip;
}

.topbar {
	display: grid;
	gap: 14px;
	padding: var(--pad);
}

.eyebrow {
	font-size: 0.78rem;
	letter-spacing: 0.18em;
	text-transform: uppercase;
	color: var(--text-soft);
}

.headline-row {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 18px;
	flex-wrap: wrap;
}

h1 {
	margin: 0;
	font-size: clamp(1.45rem, 2vw, 2.4rem);
	line-height: 1.05;
	letter-spacing: -0.03em;
}

.controls-wrap {
	display: grid;
	gap: 14px;
	padding: 0 var(--pad) var(--pad);
}

.controls {
	display: flex;
	gap: 10px;
	flex-wrap: wrap;
	align-items: center;
}

.btn {
	height: var(--control-h);
	width: var(--control-h);
	min-width: var(--control-h);
	padding: 0;
	border: 1px solid var(--border);
	border-radius: 999px;
	background: linear-gradient(
		180deg,
		rgba(255, 255, 255, 0.09),
		rgba(255, 255, 255, 0.045)
	);
	color: var(--text);
	cursor: pointer;
	transition: transform 140ms ease, background 140ms ease,
		border-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
	user-select: none;
	display: inline-flex;
	align-items: center;
	justify-content: center;
}

.btn:hover {
	transform: translateY(-1px);
	background: linear-gradient(
		180deg,
		rgba(255, 255, 255, 0.13),
		rgba(255, 255, 255, 0.06)
	);
	border-color: rgba(255, 255, 255, 0.18);
}

.btn:active {
	transform: translateY(0);
}

.btn:focus-visible,
.timeline:focus-visible {
	outline: none;
	box-shadow: var(--focus);
}

.btn--primary {
	background: linear-gradient(
		135deg,
		rgba(124, 156, 255, 0.95),
		rgba(159, 124, 255, 0.95)
	);
	border-color: transparent;
	color: white;
}

.btn--primary:hover {
	filter: brightness(1.05);
}

.btn--danger {
	color: #fff;
	background: linear-gradient(
		180deg,
		rgba(255, 107, 107, 0.22),
		rgba(255, 107, 107, 0.1)
	);
	border-color: rgba(255, 107, 107, 0.28);
}

.btn--active {
	box-shadow: 0 0 0 2px rgba(124, 156, 255, 0.2) inset;
	border-color: rgba(124, 156, 255, 0.38);
}

.material-symbols-rounded {
	font-family: "Material Symbols Rounded";
	font-weight: 500;
	font-style: normal;
	font-size: 26px;
	line-height: 1;
	letter-spacing: normal;
	text-transform: none;
	display: inline-block;
	white-space: nowrap;
	direction: ltr;
	-webkit-font-smoothing: antialiased;
	font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 24;
}

.timeline-row {
	display: grid;
	grid-template-columns: auto 1fr auto;
	align-items: center;
	gap: 14px;
}

.time {
	min-width: 64px;
	font-variant-numeric: tabular-nums;
	color: var(--text-soft);
	font-size: 0.92rem;
	text-align: center;
}

.timeline {
	-webkit-appearance: none;
	appearance: none;
	width: 100%;
	height: 10px;
	border-radius: 999px;
	background: linear-gradient(
		90deg,
		rgba(124, 156, 255, 0.95) 0%,
		rgba(159, 124, 255, 0.95) var(--progress, 0%),
		rgba(255, 255, 255, 0.12) var(--progress, 0%),
		rgba(255, 255, 255, 0.12) 100%
	);
	outline: none;
	cursor: pointer;
	border: 1px solid rgba(255, 255, 255, 0.08);
}

.timeline::-webkit-slider-thumb {
	-webkit-appearance: none;
	appearance: none;
	width: 22px;
	height: 22px;
	border-radius: 50%;
	background: white;
	border: 2px solid rgba(124, 156, 255, 1);
	box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
}

.timeline::-moz-range-thumb {
	width: 22px;
	height: 22px;
	border-radius: 50%;
	background: white;
	border: 2px solid rgba(124, 156, 255, 1);
	box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
	cursor: pointer;
}

.timeline::-moz-range-track {
	height: 10px;
	border-radius: 999px;
	background: transparent;
}

.grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: var(--gap);
	padding: 0 var(--pad) var(--pad);
}

.video-card {
	position: relative;
	background: rgba(255, 255, 255, 0.035);
	border: 1px solid var(--border);
	border-radius: var(--radius-xl);
	overflow: hidden;
	min-width: 0;
	box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.video-shell {
	aspect-ratio: 16 / 9;
	min-height: var(--player-min-h);
	width: 100%;
}

.video-shell > div,
.video-shell iframe {
	width: 100% !important;
	height: 100% !important;
	display: block;
	border: 0;
}

.video-title {
	background: rgba(0, 0, 0, 0.6);
	position: absolute;
	text-align: center;
	left: 50%;
	transform: translateX(-50%);
	padding: 4px 12px;
	z-index: 2;
}

.teams {
	font-size: 12px;
	border-bottom-left-radius: 6px;
	border-bottom-right-radius: 6px;
}

.team-harvest {
	color: #6969ff;
	border-left: 1px solid #6969ff;
	border-bottom: 1px solid #6969ff;
	border-right: 1px solid #6969ff;
}

.team-progression {
	color: #008800;
	border-left: 1px solid #008800;
	border-bottom: 1px solid #008800;
	border-right: 1px solid #008800;
}

.team-tower {
	color: #ff4d4d;
	border-left: 1px solid #ff4d4d;
	border-bottom: 1px solid #ff4d4d;
	border-right: 1px solid #ff4d4d;
}

.team-pit {
	color: #ae00ff;
	border-left: 1px solid #ae00ff;
	border-bottom: 1px solid #ae00ff;
	border-right: 1px solid #ae00ff;
}

.team-trist-hole {
	color: #ffa800;
	border-left: 1px solid #ffa800;
	border-bottom: 1px solid #ffa800;
	border-right: 1px solid #ffa800;
}

.footer-note {
	padding: 0 var(--pad) var(--pad);
	color: var(--text-soft);
	font-size: 0.9rem;
	display: flex;
	justify-content: space-between;
	gap: 16px;
	flex-wrap: wrap;
}

.kbd {
	display: inline-grid;
	place-items: center;
	min-width: 1.8em;
	height: 1.8em;
	padding: 0 0.45em;
	border-radius: 8px;
	border: 1px solid rgba(255, 255, 255, 0.12);
	background: rgba(255, 255, 255, 0.06);
	color: rgba(255, 255, 255, 0.92);
	font-size: 0.85em;
	font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}

@media (max-width: 1100px) {
	.grid {
		grid-template-columns: 1fr;
	}

	.video-shell {
		min-height: min(46vh, 540px);
	}
}

@media (max-width: 760px) {
	.timeline-row {
		grid-template-columns: 1fr;
	}

	.time {
		display: none;
	}

	.controls {
		display: grid;
		grid-template-columns: repeat(3, minmax(0, 1fr));
	}

	.btn {
		width: 100%;
	}

	.btn--primary {
		grid-column: 1 / -1;
	}
}

@media (prefers-reduced-motion: reduce) {
	.btn {
		transition: none;
	}
}


  </style>
</head>
<body>
  <main class="app">
	<section class="panel">
		<div class="topbar">
			<div class="eyebrow">S12 PD2 WR Speedrun 1:35:54</div>

			<div class="headline-row">
				<h1>Speedrunners POV</h1>
			</div>
		</div>

		<div class="controls-wrap">
			<div class="controls" aria-label="Video controls">
				<button class="btn btn--primary" id="togglePlay" type="button" aria-label="Play all videos">
					<span class="material-symbols-rounded" id="togglePlayIcon">play_arrow</span>
				</button>

				<button class="btn" id="restartBoth" type="button" aria-label="Restart all videos">
					<span class="material-symbols-rounded">replay</span>
				</button>

				<button class="btn" id="rewindBoth" type="button" aria-label="Rewind all videos by 10 seconds">
					<span class="material-symbols-rounded">replay_10</span>
				</button>

				<button class="btn" id="forwardBoth" type="button" aria-label="Fast forward all videos by 10 seconds">
					<span class="material-symbols-rounded">forward_10</span>
				</button>

				<button class="btn" id="toggleMuteFirst" type="button" aria-label="Toggle first video audio">
					<span class="material-symbols-rounded" id="muteFirstIcon">volume_up</span>
				</button>

				<button class="btn btn--danger" id="stopBoth" type="button" aria-label="Stop all videos">
					<span class="material-symbols-rounded">stop</span>
				</button>
			</div>

			<div class="timeline-row">
				<div class="time" id="currentTime">0:00</div>
				<input class="timeline" id="timeline" type="range" min="0" max="100" value="0" step="0.05" aria-label="Shared video timeline" />
				<div class="time" id="duration">0:00</div>
			</div>
		</div>

		<div class="grid">
			<article class="video-card">
				<div class="video-title teams team-harvest">Tele Sorc</div>
				<div class="video-shell">
					<div id="player1"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-progression">Assassin</div>
				<div class="video-shell">
					<div id="player2"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-trist-hole">Barb</div>
				<div class="video-shell">
					<div id="player3"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-pit">Necro</div>
				<div class="video-shell">
					<div id="player4"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams team-tower">Assassin aka Pally 1</div>
				<div class="video-shell">
					<div id="player5"></div>
				</div>
			</article>

			<article class="video-card">
				<div class="video-title teams">Necro</div>
				<div class="video-shell">
					<div id="player6"></div>
				</div>
			</article>
		</div>

		<div class="footer-note">
			<span>
				<span class="kbd">Space</span> play/pause,
				<span class="kbd">←</span> back,
				<span class="kbd">→</span> forward,
				<span class="kbd">R</span> restart,
				<span class="kbd">S</span> stop,
				<span class="kbd">M</span> mute first
			</span>
			<span id="statusText">Ready</span>
		</div>
	</section>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    (() => {
	const CONFIG = {
		players: [
			{
				id: "player1",
				platform: "youtube",
				videoId: "9pvRbezK8Ko",
				start: 41,
				quality: "hd720"
			},
			{
				id: "player2",
				platform: "youtube",
				videoId: "_IWYetw6X1Q",
				start: 11,
				quality: "hd1080"
			},
			{
				id: "player3",
				platform: "youtube",
				videoId: "3H0DvdlLVEU",
				start: 129,
				quality: "hd1080"
			},
			{
				id: "player4",
				platform: "youtube",
				videoId: "X0KH7VcogFE",
				start: 95,
				quality: "hd1080"
			},
			{
				id: "player5",
				platform: "youtube",
				videoId: "aMVdJk2GGNw",
				start: 5,
				quality: "hd720"
			},
			{
				id: "player6",
				platform: "twitch",
				videoId: "2609194736",
				start: 0,
				quality: "chunked"
			}
		],
		seekStep: 10,
		uiTickMs: 120,
		resyncEveryMs: 500,
		resyncThresholdSeconds: 0.4
	};

	const state = {
		players: [],
		readyCount: 0,
		uiInterval: null,
		resyncInterval: null,
		isScrubbing: false,
		firstMuted: false
	};

	const els = {
		togglePlay: document.getElementById("togglePlay"),
		togglePlayIcon: document.getElementById("togglePlayIcon"),
		restartBoth: document.getElementById("restartBoth"),
		rewindBoth: document.getElementById("rewindBoth"),
		forwardBoth: document.getElementById("forwardBoth"),
		stopBoth: document.getElementById("stopBoth"),
		toggleMuteFirst: document.getElementById("toggleMuteFirst"),
		muteFirstIcon: document.getElementById("muteFirstIcon"),
		timeline: document.getElementById("timeline"),
		currentTime: document.getElementById("currentTime"),
		duration: document.getElementById("duration"),
		statusText: document.getElementById("statusText")
	};

	function setStatus(text) {
		els.statusText.textContent = text;
	}

	function formatTime(seconds) {
		const total = Math.max(0, Math.floor(Number(seconds) || 0));
		const hours = Math.floor(total / 3600);
		const mins = Math.floor((total % 3600) / 60);
		const secs = total % 60;

		if (hours > 0) {
			return `${hours}:${String(mins).padStart(2, "0")}:${String(secs).padStart(
				2,
				"0"
			)}`;
		}

		return `${mins}:${String(secs).padStart(2, "0")}`;
	}

	function clamp(value, min, max) {
		return Math.min(Math.max(value, min), max);
	}

	function getMaster() {
		return state.players[0] || null;
	}

	function getFirstPlayerObj() {
		return state.players[0] || null;
	}

	function isYouTube(playerObj) {
		return playerObj?.platform === "youtube";
	}

	function isTwitch(playerObj) {
		return playerObj?.platform === "twitch";
	}

	function playOne(playerObj) {
		if (!playerObj?.instance) return;
		if (isYouTube(playerObj)) playerObj.instance.playVideo();
		else playerObj.instance.play();
	}

	function pauseOne(playerObj) {
		if (!playerObj?.instance) return;
		if (isYouTube(playerObj)) playerObj.instance.pauseVideo();
		else playerObj.instance.pause();
	}

	function stopOne(playerObj) {
		if (!playerObj?.instance) return;

		if (isYouTube(playerObj)) {
			playerObj.instance.stopVideo();
		} else {
			playerObj.instance.pause();
			playerObj.instance.seek(playerObj.start || 0);
		}
	}

	function seekOne(playerObj, absoluteTime, allowPlayState = true) {
		if (!playerObj?.instance) return;

		if (isYouTube(playerObj)) {
			playerObj.instance.seekTo(absoluteTime, true);
			return;
		}

		playerObj.instance.seek(absoluteTime);

		if (!allowPlayState) {
			playerObj.instance.pause();
		}
	}

	function getCurrentOne(playerObj) {
		if (!playerObj?.instance?.getCurrentTime) return 0;
		return playerObj.instance.getCurrentTime();
	}

	function getDurationOne(playerObj) {
		if (!playerObj?.instance?.getDuration) return 0;
		return playerObj.instance.getDuration();
	}

	function setMutedOne(playerObj, muted) {
		if (!playerObj?.instance) return;

		if (isYouTube(playerObj)) {
			if (muted) playerObj.instance.mute();
			else playerObj.instance.unMute();
			return;
		}

		playerObj.instance.setMuted(muted);
	}

	function getMutedOne(playerObj) {
		if (!playerObj?.instance) return false;

		if (isYouTube(playerObj)) {
			return playerObj.instance.isMuted ? playerObj.instance.isMuted() : false;
		}

		return playerObj.instance.getMuted ? playerObj.instance.getMuted() : false;
	}

	function getPlayingOne(playerObj) {
		if (!playerObj?.instance) return false;

		if (isYouTube(playerObj)) {
			try {
				return playerObj.instance.getPlayerState() === YT.PlayerState.PLAYING;
			} catch {
				return false;
			}
		}

		try {
			return !playerObj.instance.isPaused();
		} catch {
			return false;
		}
	}

	function isAnyPlaying() {
		return state.players.some((playerObj) => getPlayingOne(playerObj));
	}

	function updatePlayButton() {
		const playing = isAnyPlaying();
		els.togglePlayIcon.textContent = playing ? "pause" : "play_arrow";
		els.togglePlay.setAttribute(
			"aria-label",
			playing ? "Pause all videos" : "Play all videos"
		);
	}

	function updateMuteButton() {
		els.muteFirstIcon.textContent = state.firstMuted ? "volume_off" : "volume_up";
		els.toggleMuteFirst.classList.toggle("btn--active", !state.firstMuted);
		els.toggleMuteFirst.setAttribute(
			"aria-label",
			state.firstMuted ? "Unmute first video" : "Mute first video"
		);
	}

	function getRelativeCurrent(playerObj) {
		return Math.max(0, getCurrentOne(playerObj) - playerObj.start);
	}

	function getRelativeDuration(playerObj) {
		return Math.max(0, getDurationOne(playerObj) - playerObj.start);
	}

	function syncTimelineVisual(value, max) {
		const safeMax = Math.max(0.0001, Number(max) || 100);
		const pct = `${(Number(value) / safeMax) * 100}%`;
		els.timeline.style.setProperty("--progress", pct);
	}

	function updateTimeline() {
		const master = getMaster();
		if (!master || !master.instance) return;

		const current = getRelativeCurrent(master);
		const duration = getRelativeDuration(master);

		if (!state.isScrubbing) {
			els.timeline.max = duration || 100;
			els.timeline.value = clamp(current, 0, duration || 100);
			syncTimelineVisual(els.timeline.value, els.timeline.max);
			els.currentTime.textContent = formatTime(current);
		}

		els.duration.textContent = formatTime(duration);
		updatePlayButton();
	}

	function runBoth(callback) {
		state.players.forEach((playerObj) => {
			if (playerObj.instance) callback(playerObj);
		});
	}

	function playBoth() {
		runBoth((playerObj) => playOne(playerObj));
		setStatus("Playing all");
		updatePlayButton();
	}

	function pauseBoth() {
		runBoth((playerObj) => pauseOne(playerObj));
		setStatus("Paused");
		updatePlayButton();
	}

	function stopBoth() {
		runBoth((playerObj) => stopOne(playerObj));
		setStatus("Stopped");
		updatePlayButton();
	}

	function restartBoth() {
		runBoth((playerObj) => {
			seekOne(playerObj, playerObj.start, false);
			playOne(playerObj);
		});
		setStatus("Restarted");
		updatePlayButton();
	}

	function offsetBoth(seconds) {
		runBoth((playerObj) => {
			const current = getCurrentOne(playerObj);
			seekOne(playerObj, Math.max(0, current + seconds));
		});
		setStatus(
			seconds > 0 ? `Forward ${seconds}s` : `Rewind ${Math.abs(seconds)}s`
		);
	}

	function seekRelativeTo(relativeTime, shouldPlayAfter = false) {
		runBoth((playerObj) => {
			seekOne(playerObj, playerObj.start + relativeTime, shouldPlayAfter);
			if (shouldPlayAfter) playOne(playerObj);
		});

		els.currentTime.textContent = formatTime(relativeTime);
		syncTimelineVisual(relativeTime, els.timeline.max);
		setStatus(`Seek to ${formatTime(relativeTime)}`);
	}

	function toggleMuteFirst() {
		const firstObj = getFirstPlayerObj();
		if (!firstObj) return;

		state.firstMuted = !state.firstMuted;
		setMutedOne(firstObj, state.firstMuted);
		updateMuteButton();
		setStatus(state.firstMuted ? "First video muted" : "First video unmuted");
	}

	function resyncPlayers() {
		if (state.isScrubbing || !isAnyPlaying() || state.players.length < 2) return;

		const master = getMaster();
		if (!master?.instance) return;

		const masterTime = getCurrentOne(master);

		state.players.slice(1).forEach((playerObj) => {
			const current = getCurrentOne(playerObj);
			const diff = Math.abs(current - masterTime);

			if (diff > CONFIG.resyncThresholdSeconds) {
				seekOne(playerObj, masterTime);
			}
		});
	}

	function markReady() {
		state.readyCount += 1;

		if (state.readyCount === CONFIG.players.length) {
			updateTimeline();

			if (!state.uiInterval) {
				state.uiInterval = setInterval(updateTimeline, CONFIG.uiTickMs);
			}

			if (!state.resyncInterval) {
				state.resyncInterval = setInterval(resyncPlayers, CONFIG.resyncEveryMs);
			}

			setStatus("Loaded");
		}
	}

	function onYouTubeReady(event) {
		const playerObj = state.players.find((p) => p.instance === event.target);
		if (!playerObj) return;

		playerObj.ready = true;

		try {
			event.target.setPlaybackQuality(playerObj.quality);
		} catch {}

		if (playerObj.id === "player1") {
			state.firstMuted = getMutedOne(playerObj);

			if (state.firstMuted) {
				try {
					event.target.unMute();
					state.firstMuted = false;
				} catch {}
			}
		} else {
			event.target.mute();
		}

		updateMuteButton();
		markReady();
	}

	function onYouTubeStateChange() {
		updatePlayButton();
	}

	function onYouTubeError(event, label) {
		setStatus(`${label} error: ${event.data}`);
		console.error(`${label} error`, event.data);
	}

	function attachTwitchEvents(playerObj) {
		const player = playerObj.instance;

		player.addEventListener(Twitch.Player.READY, () => {
			playerObj.ready = true;

			try {
				player.setQuality(playerObj.quality || "chunked");
			} catch {}

			if (playerObj.id === "player1") {
				state.firstMuted = getMutedOne(playerObj);
			} else {
				player.setMuted(true);
			}

			updateMuteButton();
			markReady();
		});

		player.addEventListener(Twitch.Player.PLAY, updatePlayButton);
		player.addEventListener(Twitch.Player.PLAYING, updatePlayButton);
		player.addEventListener(Twitch.Player.PAUSE, updatePlayButton);
		player.addEventListener(Twitch.Player.ENDED, updatePlayButton);

		player.addEventListener(Twitch.Player.PLAYBACK_BLOCKED, () => {
			setStatus("Twitch playback blocked");
		});
	}

	window.onYouTubeIframeAPIReady = function () {
		const origin = window.location.origin;
		const parentHost = window.location.hostname;

		state.players = CONFIG.players.map((cfg, index) => {
			let instance;

			if (cfg.platform === "twitch") {
				instance = new Twitch.Player(cfg.id, {
					width: "100%",
					height: "100%",
					video: cfg.videoId.startsWith("v") ? cfg.videoId : `v${cfg.videoId}`,
					parent: [parentHost],
					autoplay: false,
					muted: true
				});

				const playerObj = {
					...cfg,
					instance,
					ready: false
				};

				attachTwitchEvents(playerObj);
				return playerObj;
			}

			instance = new YT.Player(cfg.id, {
				width: "100%",
				height: "100%",
				videoId: cfg.videoId,
				playerVars: {
					autoplay: 0,
					controls: 0,
					rel: 0,
					playsinline: 1,
					enablejsapi: 1,
					origin,
					start: cfg.start
				},
				events: {
					onReady: onYouTubeReady,
					onStateChange: onYouTubeStateChange,
					onError: (e) => onYouTubeError(e, `Player ${index + 1}`)
				}
			});

			return {
				...cfg,
				instance,
				ready: false
			};
		});

		setStatus("Initializing players…");
	};

	els.togglePlay.addEventListener("click", () => {
		if (isAnyPlaying()) {
			pauseBoth();
		} else {
			playBoth();
		}
	});

	els.stopBoth.addEventListener("click", stopBoth);
	els.restartBoth.addEventListener("click", restartBoth);
	els.rewindBoth.addEventListener("click", () => offsetBoth(-CONFIG.seekStep));
	els.forwardBoth.addEventListener("click", () => offsetBoth(CONFIG.seekStep));
	els.toggleMuteFirst.addEventListener("click", toggleMuteFirst);

	els.timeline.addEventListener("input", () => {
		state.isScrubbing = true;
		syncTimelineVisual(els.timeline.value, els.timeline.max);
		els.currentTime.textContent = formatTime(els.timeline.value);
	});

	els.timeline.addEventListener("change", () => {
		const target = Number(els.timeline.value) || 0;
		const keepPlaying = isAnyPlaying();
		seekRelativeTo(target, keepPlaying);
		state.isScrubbing = false;
	});

	els.timeline.addEventListener("pointerdown", () => {
		state.isScrubbing = true;
	});

	els.timeline.addEventListener("pointerup", () => {
		state.isScrubbing = false;
	});

	document.addEventListener("keydown", (event) => {
		const tag = document.activeElement?.tagName;
		const typing =
			tag === "INPUT" ||
			tag === "TEXTAREA" ||
			document.activeElement?.isContentEditable;

		if (typing && document.activeElement !== els.timeline) return;

		switch (event.key) {
			case " ":
			case "k":
			case "K":
				event.preventDefault();
				els.togglePlay.click();
				break;
			case "ArrowLeft":
				event.preventDefault();
				offsetBoth(-CONFIG.seekStep);
				break;
			case "ArrowRight":
				event.preventDefault();
				offsetBoth(CONFIG.seekStep);
				break;
			case "r":
			case "R":
				event.preventDefault();
				restartBoth();
				break;
			case "s":
			case "S":
				event.preventDefault();
				stopBoth();
				break;
			case "m":
			case "M":
				event.preventDefault();
				toggleMuteFirst();
				break;
		}
	});

	window.addEventListener("beforeunload", () => {
		if (state.uiInterval) clearInterval(state.uiInterval);
		if (state.resyncInterval) clearInterval(state.resyncInterval);

		runBoth(({ instance, platform }) => {
			try {
				if (platform === "youtube" && instance.destroy) instance.destroy();
			} catch {}
		});
	});
})();

  </script>
</body>
</html>
