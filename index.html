<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Test</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: black;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      gap: 20px;
      width: 100vw;
      min-height: 100vh;
      padding: 20px;
    }

    .video {
      flex: 1;
      min-width: 0;
      min-height: 300px;
    }

    .video > div,
    .video iframe {
      width: 100% !important;
      height: 100% !important;
      display: block;
      border: 0;
    }

    @media (max-width: 1100px) {
      .container {
        flex-direction: column;
      }

      .video {
        min-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <section class="container">
    <div class="video"><div id="player1"></div></div>
    <div class="video"><div id="player2"></div></div>
  </section>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player1;
    let player2;

    function onYouTubeIframeAPIReady() {
      player1 = new YT.Player("player1", {
        width: "100%",
        height: "100%",
        videoId: "9pvRbezK8Ko",
        playerVars: {
          autoplay: 1,
          mute: 1,
          start: 34,
          controls: 1,
          rel: 0,
          playsinline: 1
        },
        events: {
          onReady: (e) => {
            e.target.mute();
            e.target.setPlaybackQuality("hd720");
            e.target.playVideo();
          },
          onAutoplayBlocked: () => {
            console.log("Player 1 autoplay was blocked.");
          }
        }
      });

      player2 = new YT.Player("player2", {
        width: "100%",
        height: "100%",
        videoId: "_IWYetw6X1Q",
        playerVars: {
          autoplay: 1,
          mute: 1,
          start: 4,
          controls: 1,
          rel: 0,
          playsinline: 1
        },
        events: {
          onReady: (e) => {
            e.target.mute();
            e.target.setPlaybackQuality("hd1080");
            e.target.playVideo();
          },
          onAutoplayBlocked: () => {
            console.log("Player 2 autoplay was blocked.");
          }
        }
      });
    }
  </script>
</body>

</html>
