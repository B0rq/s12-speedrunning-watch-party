<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual YouTube Showcase</title>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0"
  />

  <style>
    :root {
      --bg: #0b0d12;
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7fb;
      --text-soft: rgba(245, 247, 251, 0.72);
      --accent: #7c9cff;
      --accent-2: #9f7cff;
      --danger: #ff6b6b;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --pad: clamp(16px, 2vw, 28px);
      --gap: clamp(14px, 1.5vw, 22px);
      --control-h: 54px;
      --player-min-h: 320px;
      --focus: 0 0 0 3px rgba(124, 156, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(124, 156, 255, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(159, 124, 255, 0.10), transparent 28%),
        linear-gradient(180deg, #0b0d12 0%, #090b10 100%);
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 2.5vw, 32px);
    }

    .app {
      width: min(1600px, 100%);
      display: grid;
      gap: var(--gap);
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.045));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: clip;
    }

    .topbar {
      display: grid;
      gap: 14px;
      padding: var(--pad);
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .headline-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2vw, 2.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .meta {
      color: var(--text-soft);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
    }

    .controls-wrap {
      display: grid;
      gap: 14px;
      padding: 0 var(--pad) var(--pad);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      height: var(--control-h);
      width: var(--control-h);
      min-width: var(--control-h);
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.045));
      color: var(--text);
      cursor: pointer;
      transition:
        transform 140ms ease,
        background 140ms ease,
        border-color 140ms ease,
        box-shadow 140ms ease,
        opacity 140ms ease;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      border-color: rgba(255,255,255,0.18);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:focus-visible,
    .timeline:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .btn--primary {
      background: linear-gradient(135deg, rgba(124,156,255,0.95), rgba(159,124,255,0.95));
      border-color: transparent;
      color: white;
    }

    .btn--primary:hover {
      filter: brightness(1.05);
    }

    .btn--danger {
      color: #fff;
      background: linear-gradient(180deg, rgba(255,107,107,0.22), rgba(255,107,107,0.10));
      border-color: rgba(255,107,107,0.28);
    }

    .btn--active {
      box-shadow: 0 0 0 2px rgba(124,156,255,0.20) inset;
      border-color: rgba(124,156,255,0.38);
    }

    .material-symbols-rounded {
      font-size: 24px;
      line-height: 1;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .time {
      min-width: 64px;
      font-variant-numeric: tabular-nums;
      color: var(--text-soft);
      font-size: 0.92rem;
      text-align: center;
    }

    .timeline {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background:
        linear-gradient(
          90deg,
          rgba(124,156,255,0.95) 0%,
          rgba(159,124,255,0.95) var(--progress, 0%),
          rgba(255,255,255,0.12) var(--progress, 0%),
          rgba(255,255,255,0.12) 100%
        );
      outline: none;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .timeline::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 2px solid rgba(124,156,255,1);
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .timeline::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 2px solid rgba(124,156,255,1);
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      cursor: pointer;
    }

    .timeline::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      padding: 0 var(--pad) var(--pad);
    }

    .video-card {
      position: relative;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .video-shell {
      aspect-ratio: 16 / 9;
      min-height: var(--player-min-h);
      width: 100%;
    }

    .video-shell > div,
    .video-shell iframe {
      width: 100% !important;
      height: 100% !important;
      display: block;
      border: 0;
    }

    .footer-note {
      padding: 0 var(--pad) var(--pad);
      color: var(--text-soft);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .kbd {
      display: inline-grid;
      place-items: center;
      min-width: 1.8em;
      height: 1.8em;
      padding: 0 0.45em;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      font-size: 0.85em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .video-shell {
        min-height: min(46vh, 540px);
      }
    }

    @media (max-width: 760px) {
      .timeline-row {
        grid-template-columns: 1fr;
      }

      .time {
        display: none;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .btn {
        width: 100%;
      }

      .btn--primary {
        grid-column: 1 / -1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="topbar">
        <div class="eyebrow">S12 PD2 WR Speedrun 1:35:54</div>

        <div class="headline-row">
          <h1>POV</h1>
        </div>
      </div>

      <div class="controls-wrap">
        <div class="controls" aria-label="Video controls">
          <button class="btn btn--primary" id="togglePlay" type="button" aria-label="Play both videos">
            <span class="material-symbols-rounded" id="togglePlayIcon">play_arrow</span>
          </button>

          <button class="btn" id="restartBoth" type="button" aria-label="Restart both videos">
            <span class="material-symbols-rounded">replay</span>
          </button>

          <button class="btn" id="rewindBoth" type="button" aria-label="Rewind both videos by 10 seconds">
            <span class="material-symbols-rounded">replay_10</span>
          </button>

          <button class="btn" id="forwardBoth" type="button" aria-label="Fast forward both videos by 10 seconds">
            <span class="material-symbols-rounded">forward_10</span>
          </button>

          <button class="btn" id="toggleMuteFirst" type="button" aria-label="Toggle first video audio">
            <span class="material-symbols-rounded" id="muteFirstIcon">volume_up</span>
          </button>

          <button class="btn btn--danger" id="stopBoth" type="button" aria-label="Stop both videos">
            <span class="material-symbols-rounded">stop</span>
          </button>
        </div>

        <div class="timeline-row">
          <div class="time" id="currentTime">0:00</div>
          <input
            class="timeline"
            id="timeline"
            type="range"
            min="0"
            max="100"
            value="0"
            step="0.05"
            aria-label="Shared video timeline"
          />
          <div class="time" id="duration">0:00</div>
        </div>
      </div>

      <div class="grid">
        <article class="video-card">
          <div class="video-shell">
            <div id="player1"></div>
          </div>
        </article>

        <article class="video-card">
          <div class="video-shell">
            <div id="player2"></div>
          </div>
        </article>
      </div>

      <div class="footer-note">
        <span>
          <span class="kbd">Space</span> play/pause,
          <span class="kbd">←</span> back,
          <span class="kbd">→</span> forward,
          <span class="kbd">R</span> restart,
          <span class="kbd">S</span> stop,
          <span class="kbd">M</span> mute first
        </span>
        <span id="statusText">Ready</span>
      </div>
    </section>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    (() => {
      const CONFIG = {
        players: [
          { id: "player1", videoId: "9pvRbezK8Ko", start: 34, quality: "hd720" },
          { id: "player2", videoId: "_IWYetw6X1Q", start: 4, quality: "hd1080" }
        ],
        seekStep: 10,
        uiTickMs: 120
      };

      const state = {
        players: [],
        readyCount: 0,
        uiInterval: null,
        isScrubbing: false,
        firstMuted: false
      };

      const els = {
        togglePlay: document.getElementById("togglePlay"),
        togglePlayIcon: document.getElementById("togglePlayIcon"),
        restartBoth: document.getElementById("restartBoth"),
        rewindBoth: document.getElementById("rewindBoth"),
        forwardBoth: document.getElementById("forwardBoth"),
        stopBoth: document.getElementById("stopBoth"),
        toggleMuteFirst: document.getElementById("toggleMuteFirst"),
        muteFirstIcon: document.getElementById("muteFirstIcon"),
        timeline: document.getElementById("timeline"),
        currentTime: document.getElementById("currentTime"),
        duration: document.getElementById("duration"),
        statusText: document.getElementById("statusText")
      };

      function setStatus(text) {
        els.statusText.textContent = text;
      }

      function formatTime(seconds) {
        const total = Math.max(0, Math.floor(Number(seconds) || 0));
        const hours = Math.floor(total / 3600);
        const mins = Math.floor((total % 3600) / 60);
        const secs = total % 60;

        if (hours > 0) {
          return `${hours}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
        }

        return `${mins}:${String(secs).padStart(2, "0")}`;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getMaster() {
        return state.players[0] || null;
      }

      function getFirstPlayer() {
        return state.players[0]?.instance || null;
      }

      function getPlayerState(player) {
        try {
          return player?.getPlayerState?.();
        } catch {
          return -1;
        }
      }

      function isAnyPlaying() {
        return state.players.some((p) => getPlayerState(p.instance) === YT.PlayerState.PLAYING);
      }

      function updatePlayButton() {
        const playing = isAnyPlaying();
        els.togglePlayIcon.textContent = playing ? "pause" : "play_arrow";
        els.togglePlay.setAttribute("aria-label", playing ? "Pause both videos" : "Play both videos");
      }

      function updateMuteButton() {
        els.muteFirstIcon.textContent = state.firstMuted ? "volume_off" : "volume_up";
        els.toggleMuteFirst.classList.toggle("btn--active", !state.firstMuted);
        els.toggleMuteFirst.setAttribute(
          "aria-label",
          state.firstMuted ? "Unmute first video" : "Mute first video"
        );
      }

      function getRelativeCurrent(playerObj) {
        if (!playerObj?.instance?.getCurrentTime) return 0;
        return Math.max(0, playerObj.instance.getCurrentTime() - playerObj.start);
      }

      function getRelativeDuration(playerObj) {
        if (!playerObj?.instance?.getDuration) return 0;
        return Math.max(0, playerObj.instance.getDuration() - playerObj.start);
      }

      function syncTimelineVisual(value, max) {
        const safeMax = Math.max(0.0001, Number(max) || 100);
        const pct = `${(Number(value) / safeMax) * 100}%`;
        els.timeline.style.setProperty("--progress", pct);
      }

      function updateTimeline() {
        const master = getMaster();
        if (!master || !master.instance) return;

        const current = getRelativeCurrent(master);
        const duration = getRelativeDuration(master);

        if (!state.isScrubbing) {
          els.timeline.max = duration || 100;
          els.timeline.value = clamp(current, 0, duration || 100);
          syncTimelineVisual(els.timeline.value, els.timeline.max);
          els.currentTime.textContent = formatTime(current);
        }

        els.duration.textContent = formatTime(duration);
        updatePlayButton();
      }

      function runBoth(callback) {
        state.players.forEach((playerObj) => {
          if (playerObj.instance) callback(playerObj);
        });
      }

      function playBoth() {
        runBoth(({ instance }) => instance.playVideo());
        setStatus("Playing both");
        updatePlayButton();
      }

      function pauseBoth() {
        runBoth(({ instance }) => instance.pauseVideo());
        setStatus("Paused");
        updatePlayButton();
      }

      function stopBoth() {
        runBoth(({ instance }) => instance.stopVideo());
        setStatus("Stopped");
        updatePlayButton();
      }

      function restartBoth() {
        runBoth(({ instance, start }) => {
          instance.seekTo(start, true);
          instance.playVideo();
        });
        setStatus("Restarted");
        updatePlayButton();
      }

      function offsetBoth(seconds) {
        runBoth(({ instance }) => {
          const current = instance.getCurrentTime();
          instance.seekTo(Math.max(0, current + seconds), true);
        });
        setStatus(seconds > 0 ? `Forward ${seconds}s` : `Rewind ${Math.abs(seconds)}s`);
      }

      function seekRelativeTo(relativeTime, shouldPlayAfter = false) {
        runBoth(({ instance, start }) => {
          instance.seekTo(start + relativeTime, true);
          if (shouldPlayAfter) instance.playVideo();
        });

        els.currentTime.textContent = formatTime(relativeTime);
        syncTimelineVisual(relativeTime, els.timeline.max);
        setStatus(`Seek to ${formatTime(relativeTime)}`);
      }

      function toggleMuteFirst() {
        const first = getFirstPlayer();
        if (!first) return;

        if (state.firstMuted) {
          first.unMute();
          state.firstMuted = false;
          setStatus("First video unmuted");
        } else {
          first.mute();
          state.firstMuted = true;
          setStatus("First video muted");
        }

        updateMuteButton();
      }

      function onPlayerReady(event) {
        const playerObj = state.players.find((p) => p.instance === event.target);
        if (!playerObj) return;

        playerObj.ready = true;
        state.readyCount += 1;

        try {
          event.target.setPlaybackQuality(playerObj.quality);
        } catch {}

        if (playerObj.id === "player1") {
          state.firstMuted = event.target.isMuted ? event.target.isMuted() : false;

          if (state.firstMuted) {
            try {
              event.target.unMute();
              state.firstMuted = false;
            } catch {}
          }
        } else {
          event.target.mute();
        }

        updateMuteButton();

        if (state.readyCount === CONFIG.players.length) {
          updateTimeline();

          if (!state.uiInterval) {
            state.uiInterval = setInterval(updateTimeline, CONFIG.uiTickMs);
          }

          setStatus("Loaded");
        }
      }

      function onPlayerStateChange() {
        updatePlayButton();
      }

      function onPlayerError(event, label) {
        setStatus(`${label} error: ${event.data}`);
        console.error(`${label} error`, event.data);
      }

      window.onYouTubeIframeAPIReady = function () {
        const origin = window.location.origin;

        state.players = CONFIG.players.map((cfg, index) => {
          const instance = new YT.Player(cfg.id, {
            width: "100%",
            height: "100%",
            videoId: cfg.videoId,
            playerVars: {
              autoplay: 0,
              controls: 0,
              rel: 0,
              playsinline: 1,
              enablejsapi: 1,
              origin,
              start: cfg.start
            },
            events: {
              onReady: onPlayerReady,
              onStateChange: onPlayerStateChange,
              onError: (e) => onPlayerError(e, `Player ${index + 1}`)
            }
          });

          return {
            ...cfg,
            instance,
            ready: false
          };
        });

        setStatus("Initializing players…");
      };

      els.togglePlay.addEventListener("click", () => {
        if (isAnyPlaying()) {
          pauseBoth();
        } else {
          playBoth();
        }
      });

      els.stopBoth.addEventListener("click", stopBoth);
      els.restartBoth.addEventListener("click", restartBoth);
      els.rewindBoth.addEventListener("click", () => offsetBoth(-CONFIG.seekStep));
      els.forwardBoth.addEventListener("click", () => offsetBoth(CONFIG.seekStep));
      els.toggleMuteFirst.addEventListener("click", toggleMuteFirst);

      els.timeline.addEventListener("input", () => {
        state.isScrubbing = true;
        syncTimelineVisual(els.timeline.value, els.timeline.max);
        els.currentTime.textContent = formatTime(els.timeline.value);
      });

      els.timeline.addEventListener("change", () => {
        const target = Number(els.timeline.value) || 0;
        const keepPlaying = isAnyPlaying();
        seekRelativeTo(target, keepPlaying);
        state.isScrubbing = false;
      });

      els.timeline.addEventListener("pointerdown", () => {
        state.isScrubbing = true;
      });

      els.timeline.addEventListener("pointerup", () => {
        state.isScrubbing = false;
      });

      document.addEventListener("keydown", (event) => {
        const tag = document.activeElement?.tagName;
        const typing =
          tag === "INPUT" ||
          tag === "TEXTAREA" ||
          document.activeElement?.isContentEditable;

        if (typing && document.activeElement !== els.timeline) return;

        switch (event.key) {
          case " ":
          case "k":
          case "K":
            event.preventDefault();
            els.togglePlay.click();
            break;
          case "ArrowLeft":
            event.preventDefault();
            offsetBoth(-CONFIG.seekStep);
            break;
          case "ArrowRight":
            event.preventDefault();
            offsetBoth(CONFIG.seekStep);
            break;
          case "r":
          case "R":
            event.preventDefault();
            restartBoth();
            break;
          case "s":
          case "S":
            event.preventDefault();
            stopBoth();
            break;
          case "m":
          case "M":
            event.preventDefault();
            toggleMuteFirst();
            break;
        }
      });

      window.addEventListener("beforeunload", () => {
        if (state.uiInterval) clearInterval(state.uiInterval);
        runBoth(({ instance }) => {
          try {
            instance.destroy();
          } catch {}
        });
      });
    })();
  </script>
</body>
</html>
